name: Deploy til GitHub Pages

on:
  push:
    branches:
      - main

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Sjekk ut kode
        uses: actions/checkout@v4

      - name: Sett opp Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Installer avhengigheter
        run: npm ci

      - name: Bygg applikasjon
        run: npm run build

      - name: Sett opp GitHub Pages
        uses: actions/configure-pages@v5

      - name: Last opp bygget
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

      - name: Deploy til GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
